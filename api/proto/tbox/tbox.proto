syntax = "proto3";

package tbox;

option go_package = "iot/internal/pb";

// TBOX 遥测消息协议
message TelemetryMessage {
  uint32 version     = 1; // 协议版本号
  uint32 msg_type    = 2; // 消息类型: 1=心跳, 2=遥测, 3=告警
  string vin         = 3; // 车架号
  int32  power       = 4; // 功率
  int32  speed       = 5; // 速度
  int32  status      = 6; // 状态: 0-离线 1-在线
  double lat         = 7; // 纬度
  double lon         = 8; // 经度
  uint64 timestamp   = 9; // 时间戳(Unix毫秒)
}
